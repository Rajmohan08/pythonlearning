name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices-site/services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Lint (compile)
        run: python -m compileall app

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: microservices-site/services/api
          push: false
          tags: microservices-api:ci

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: microservices-site/services/web
          push: false
          tags: microservices-web:ci
